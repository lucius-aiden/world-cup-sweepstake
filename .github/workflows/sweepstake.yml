name: Sweepstake Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run automation
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_SITE_ID: ${{ secrets.MS_SITE_ID }}
          MS_DRIVE_ID: ${{ secrets.MS_DRIVE_ID }}
          MS_LEADERBOARD_ITEM_ID: ${{ secrets.MS_LEADERBOARD_ITEM_ID }}
          MS_LEADERBOARD_PATH: ${{ secrets.MS_LEADERBOARD_PATH }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python -m src.main run-once

